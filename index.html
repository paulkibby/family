<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/globals.css">
  <title>Kiki + imbecile249</title>
</head>
<body>
  <main>
    <div class="layer">
      <h1 class="title">Марафон<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart-icon lucide-heart"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg></h1>
      <div class="scoreboard">
        <div class="score">
          <div class="scoreboard-info">
            <div id="score1" class="scoreboard-num">0</div>
            <div class="scoreboard-name">Kiki</div>
          </div>
          <div class="buttons">
            <button class="button" onclick="change(1, -1)"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minus-icon lucide-minus"><path d="M5 12h14"/></svg></button>
            <button class="button" onclick="change(1, +1)"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
          </div>
        </div>
        <div class="vs">
          <div class="vs-line-top"></div>
          <div class="vs-text">VS</div>
          <div class="vs-line-bottom"></div>
        </div>
        <div class="score">
          <div class="scoreboard-info">
            <div id="score2" class="scoreboard-num">0</div>
            <div class="scoreboard-name">imbecile249</div>
          </div>
          <div class="buttons">
            <button class="button" onclick="change(2, -1)"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minus-icon lucide-minus"><path d="M5 12h14"/></svg></button>
            <button class="button" onclick="change(2, +1)"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus-icon lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const scores = [0, 0];
    const history = [];

    function change(player, delta) {
      const idx = player - 1;
      const newVal = Math.max(0, scores[idx] + delta);
      scores[idx] = newVal;

      const el = document.getElementById('score' + player);
      el.textContent = newVal;


      el.classList.remove('pop');
      void el.offsetWidth;
      if (delta > 0) el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 150);
    }
  </script>
</body>
</html>
